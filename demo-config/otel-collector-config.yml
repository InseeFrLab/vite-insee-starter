receivers:
    otlp:
        protocols:
            grpc:
                endpoint: 0.0.0.0:4317
            http:
                endpoint: 0.0.0.0:4318
                cors:
                    allowed_origins:
                        - "http://localhost:*"

exporters:
    otlp/grpc:
        endpoint: jaeger:4317
        tls:
            insecure: true
    debug:
        verbosity: basic

service:
    pipelines:
        traces:
            receivers: [otlp]
            exporters: [otlp/grpc, debug]
        logs:
            receivers: [otlp]
            exporters: [debug]
        metrics:
            receivers: [otlp]
            exporters: [debug]
